kind = "web"
previewPath = "/"
title = "Pose Detector"
version = "1.0.0"
id = "artifacts/pose-detector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24540

[services.development]
run = "pnpm --filter @workspace/pose-detector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pose-detector", "run", "build" ]
publicDir = "artifacts/pose-detector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24540"
BASE_PATH = "/"
