<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pose Detector</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #0a0a0f;
        color: #e8e8f0;
        font-family: 'Inter', system-ui, sans-serif;
        overflow: hidden;
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        gap: 0;
      }

      #header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 24px;
        background: linear-gradient(to bottom, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
      }

      #header h1 {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #c8c8e0;
      }

      #status-badge {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        font-weight: 500;
        color: #888;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 5px 12px;
      }

      #status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #666;
        transition: background 0.3s ease;
      }

      #status-dot.loading { background: #f59e0b; }
      #status-dot.active  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
      #status-dot.error   { background: #ef4444; }

      #video-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
      }

      #webcam {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      #overlay-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
        pointer-events: none;
      }

      #start-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: rgba(10,10,15,0.85);
        backdrop-filter: blur(6px);
        z-index: 10;
        transition: opacity 0.5s ease;
      }

      #start-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #start-overlay svg {
        width: 56px;
        height: 56px;
        opacity: 0.6;
      }

      #start-overlay p {
        font-size: 15px;
        color: #888;
        max-width: 280px;
        text-align: center;
        line-height: 1.6;
      }

      #start-btn {
        margin-top: 8px;
        padding: 12px 32px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        letter-spacing: 0.02em;
        box-shadow: 0 4px 20px rgba(99,102,241,0.35);
        transition: opacity 0.2s, transform 0.15s;
      }

      #start-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
      #start-btn:active { transform: translateY(0); }

      #error-overlay {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(10,10,15,0.92);
        z-index: 20;
      }

      #error-overlay.visible { display: flex; }

      #error-overlay p {
        font-size: 14px;
        color: #ef4444;
        text-align: center;
        max-width: 320px;
        line-height: 1.6;
      }

      #error-overlay small {
        font-size: 12px;
        color: #666;
      }

      #stats {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        gap: 12px;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      #stats.visible { opacity: 1; }

      .stat-chip {
        font-size: 11px;
        font-weight: 500;
        color: #aaa;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 5px 12px;
        letter-spacing: 0.03em;
      }

      .stat-chip span {
        color: #c8c8e0;
        font-weight: 600;
      }
    </style>
  </head>
  <body>

    <div id="app">

      <div id="header">
        <h1>Pose Detector</h1>
        <div id="status-badge">
          <div id="status-dot"></div>
          <span id="status-text">Idle</span>
        </div>
      </div>

      <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>

        <div id="start-overlay">
          <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1.5"/>
            <line x1="12" y1="6.5" x2="12" y2="11"/>
            <line x1="9" y1="8" x2="12" y2="10"/>
            <line x1="15" y1="8" x2="12" y2="10"/>
            <line x1="12" y1="11" x2="9" y2="16"/>
            <line x1="12" y1="11" x2="15" y2="16"/>
            <line x1="9" y1="16" x2="8" y2="20"/>
            <line x1="15" y1="16" x2="16" y2="20"/>
          </svg>
          <p>Enable your webcam and allow camera access to start real-time pose detection.</p>
          <button id="start-btn">Enable Camera</button>
        </div>

        <div id="error-overlay">
          <p id="error-msg">Camera access was denied.</p>
          <small>Please allow camera permissions in your browser and reload.</small>
        </div>
      </div>

      <div id="stats">
        <div class="stat-chip">FPS&nbsp;<span id="fps-val">—</span></div>
        <div class="stat-chip">Landmarks&nbsp;<span id="lm-val">—</span></div>
        <div class="stat-chip">Confidence&nbsp;<span id="conf-val">—</span></div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <script>
      const videoEl    = document.getElementById('webcam');
      const canvasEl   = document.getElementById('overlay-canvas');
      const ctx        = canvasEl.getContext('2d');
      const startOverlay = document.getElementById('start-overlay');
      const errorOverlay = document.getElementById('error-overlay');
      const errorMsg   = document.getElementById('error-msg');
      const statusDot  = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const statsEl    = document.getElementById('stats');
      const fpsVal     = document.getElementById('fps-val');
      const lmVal      = document.getElementById('lm-val');
      const confVal    = document.getElementById('conf-val');
      const startBtn   = document.getElementById('start-btn');

      let pose = null;
      let camera = null;
      let frameCount = 0;
      let lastFpsTime = performance.now();
      let currentFps = 0;

      function setStatus(state, text) {
        statusDot.className = '';
        statusDot.classList.add(state);
        statusText.textContent = text;
      }

      function resizeCanvas() {
        const container = document.getElementById('video-container');
        canvasEl.width  = container.clientWidth;
        canvasEl.height = container.clientHeight;
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function updateFps() {
        frameCount++;
        const now = performance.now();
        const elapsed = now - lastFpsTime;
        if (elapsed >= 500) {
          currentFps = Math.round((frameCount / elapsed) * 1000);
          frameCount = 0;
          lastFpsTime = now;
          fpsVal.textContent = currentFps;
        }
      }

      function drawResults(results) {
        ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

        if (!results.poseLandmarks) {
          lmVal.textContent = '0';
          confVal.textContent = '—';
          return;
        }

        const landmarks = results.poseLandmarks;
        const W = canvasEl.width;
        const H = canvasEl.height;

        const POSE_CONNECTIONS = window.POSE_CONNECTIONS;

        if (POSE_CONNECTIONS) {
          ctx.save();

          for (const [startIdx, endIdx] of POSE_CONNECTIONS) {
            const s = landmarks[startIdx];
            const e = landmarks[endIdx];
            if (!s || !e) continue;
            if (s.visibility < 0.3 || e.visibility < 0.3) continue;

            const alpha = Math.min(s.visibility, e.visibility);

            const sx = s.x * W;
            const sy = s.y * H;
            const ex = e.x * W;
            const ey = e.y * H;

            const mx = (sx + ex) / 2;
            const my = (sy + ey) / 2;

            const grad = ctx.createLinearGradient(sx, sy, ex, ey);

            const isArm  = (startIdx >= 11 && startIdx <= 22) || (endIdx >= 11 && endIdx <= 22);
            const isLeg  = (startIdx >= 23 && startIdx <= 32) || (endIdx >= 23 && endIdx <= 32);
            const isTorso = !isArm && !isLeg;

            let color1, color2;
            if (isArm) {
              color1 = `rgba(99,102,241,${alpha})`;
              color2 = `rgba(139,92,246,${alpha})`;
            } else if (isLeg) {
              color1 = `rgba(236,72,153,${alpha})`;
              color2 = `rgba(244,114,182,${alpha})`;
            } else {
              color1 = `rgba(34,197,94,${alpha})`;
              color2 = `rgba(74,222,128,${alpha})`;
            }

            grad.addColorStop(0, color1);
            grad.addColorStop(1, color2);

            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.lineWidth = 3;
            ctx.strokeStyle = grad;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 8;
            ctx.shadowColor = color1.replace(/[\d.]+\)$/, '0.6)');
            ctx.stroke();
          }

          ctx.restore();
        }

        let totalConf = 0;
        let visCount = 0;

        for (let i = 0; i < landmarks.length; i++) {
          const lm = landmarks[i];
          if (!lm || lm.visibility < 0.3) continue;

          totalConf += lm.visibility;
          visCount++;

          const x = lm.x * W;
          const y = lm.y * H;
          const r = lm.visibility > 0.8 ? 5 : 3.5;

          const isFace = i <= 10;
          const isArm  = i >= 11 && i <= 22;
          const isLeg  = i >= 23;

          let fill, glow;
          if (isFace) {
            fill = '#facc15';
            glow = 'rgba(250,204,21,0.6)';
          } else if (isArm) {
            fill = '#a5b4fc';
            glow = 'rgba(165,180,252,0.6)';
          } else if (isLeg) {
            fill = '#f9a8d4';
            glow = 'rgba(249,168,212,0.6)';
          } else {
            fill = '#86efac';
            glow = 'rgba(134,239,172,0.6)';
          }

          ctx.save();
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = fill;
          ctx.shadowBlur = 12;
          ctx.shadowColor = glow;
          ctx.fill();

          ctx.beginPath();
          ctx.arc(x, y, r + 2, 0, Math.PI * 2);
          ctx.strokeStyle = fill.replace(/^#/, '') === fill.replace(/^#/, '') ? fill + '55' : 'rgba(255,255,255,0.15)';
          ctx.lineWidth = 1;
          ctx.stroke();

          ctx.restore();
        }

        lmVal.textContent = visCount;
        if (visCount > 0) {
          const avgConf = Math.round((totalConf / visCount) * 100);
          confVal.textContent = avgConf + '%';
        }

        updateFps();
      }

      function initMediaPipe() {
        setStatus('loading', 'Loading model…');

        pose = new Pose({
          locateFile: (file) =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          smoothSegmentation: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
          drawResults(results);
        });

        camera = new Camera(videoEl, {
          onFrame: async () => {
            if (pose) {
              await pose.send({ image: videoEl });
            }
          },
          width: 1280,
          height: 720
        });

        camera.start()
          .then(() => {
            setStatus('active', 'Detecting');
            startOverlay.classList.add('hidden');
            statsEl.classList.add('visible');
          })
          .catch((err) => {
            console.error(err);
            setStatus('error', 'Error');
            errorMsg.textContent = 'Camera access failed: ' + (err.message || 'unknown error');
            errorOverlay.classList.add('visible');
          });
      }

      startBtn.addEventListener('click', () => {
        startOverlay.classList.add('hidden');
        setStatus('loading', 'Starting camera…');

        navigator.mediaDevices.getUserMedia({ video: true })
          .then((stream) => {
            stream.getTracks().forEach(t => t.stop());
            initMediaPipe();
          })
          .catch((err) => {
            console.error(err);
            setStatus('error', 'Denied');
            startOverlay.classList.remove('hidden');
            errorMsg.textContent = 'Camera permission denied. Please allow access and try again.';
            errorOverlay.classList.add('visible');
          });
      });
    </script>

  </body>
</html>
